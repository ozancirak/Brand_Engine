<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Brand Intelligence Engine</title>
  <style>
    body {
      margin: 0;
      background: #0f0f12;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 420px;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      background: #1a1a1f;
      border: 1px solid #2a2a30;
      color: white;
      border-radius: 6px;
    }

    button {
      background: white;
      color: black;
      font-weight: 600;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.9;
      line-height: 1.5;
    }

    .loading {
      opacity: 0.6;
      font-style: italic;
    }

    .score {
      margin-top: 10px;
      font-weight: bold;
    }

    .error {
      color: #ff6b6b;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Brand Intelligence Engine</h1>

  <input id="brandName" placeholder="Brand Name" />
  <input id="sector" placeholder="Sector" />
  <input id="targetAudience" placeholder="Target Audience" />
  <input id="pricePositioning" placeholder="Price Positioning" />

  <button onclick="generate()">Generate Snapshot</button>

  <div id="output" class="result"></div>
</div>

<script>
  async function generate() {
    const output = document.getElementById("output");

    output.innerHTML = "<div class='loading'>Analyzing competitive landscape...</div>";

    const payload = {
      brandName: document.getElementById("brandName").value,
      sector: document.getElementById("sector").value,
      targetAudience: document.getElementById("targetAudience").value,
      pricePositioning: document.getElementById("pricePositioning").value
    };

    try {
      const response = await fetch(
        "https://ozncrk.app.n8n.cloud/webhook/brand-snapshot",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        }
      );

      if (!response.ok) {
        throw new Error("HTTP " + response.status);
      }

      const result = await response.json();

      const data = result.data || result; 

      output.innerHTML = `
        <div><strong>Positioning:</strong><br>${data.positioning}</div><br>
        <div><strong>Competitive Angle:</strong><br>${data.competitive_angle}</div><br>
        <div><strong>Tone of Voice:</strong><br>${data.tone_of_voice}</div><br>
        <div><strong>Tagline:</strong><br>${data.tagline}</div><br>
        <div><strong>Strategic Risk:</strong><br>${data.strategic_risk}</div>
        <div class="score">Strategic Score: ${data.lead_score}/100</div>
      `;

    } catch (err) {
      output.innerHTML = `
        <div class="error">
          Engine temporarily unavailable.<br>
          ${err.message}
        </div>
      `;
      console.error(err);
    }
  }
</script>

</body>
</html>
